services:
  - type: web
    name: erp-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: erp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-url.netlify.app # IMPORTANT: Update this after deploying frontend!
